specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Azure Event Hubs
providerId: microsoft-azure-event-hubs
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Event Streaming
  - Microsoft Azure
description: Event Hubs throughput is bounded by the purchased Throughput Units (Basic/Standard) or
  Processing Units (Premium). Each TU allows up to 1 MB/s or 1,000 events/s ingress, 2 MB/s egress.
  Quota exceeded triggers ServerBusy. Premium PUs and Dedicated CUs scale higher; Auto-Inflate on Standard
  scales TUs up automatically.
sources:
  - https://learn.microsoft.com/en-us/azure/event-hubs/event-hubs-quotas
  - https://learn.microsoft.com/en-us/azure/event-hubs/event-hubs-scalability
  - https://learn.microsoft.com/en-us/azure/event-hubs/compare-tiers
responseCodes:
  serverBusy: 50008
  throttled: 429
limits:
  - name: Per-TU ingress (Basic, Standard)
    scope: namespace
    metric: bandwidth
    limit: '1 MB/s or 1,000 events/s per TU'
    timeFrame: second
  - name: Per-TU egress (Basic, Standard)
    scope: namespace
    metric: bandwidth
    limit: '2 MB/s per TU'
    timeFrame: second
  - name: Standard tier max TUs (self-serve)
    scope: namespace
    metric: throughput_units
    limit: 20
    notes: Standard namespaces can request up to 40 TUs via support.
  - name: Standard tier max TUs (with support request)
    scope: namespace
    metric: throughput_units
    limit: 40
  - name: Premium PUs per namespace
    scope: namespace
    metric: processing_units
    limit: 16
    notes: Purchase in 1, 2, 4, 6, 8, 10, 12, or 16 PUs. Each PU provides higher and more isolated
      throughput than a TU.
  - name: Ingress event size
    scope: per_request
    metric: event_size
    limit: '1 MB (Standard); larger on Premium/Dedicated'
  - name: Brokered connections
    scope: namespace
    metric: connections
    limit: 'Basic 100; Standard 1,000; Premium/Dedicated higher'
policies:
  - name: Auto-Inflate
    description: Standard namespaces can enable Auto-Inflate to scale TUs upward automatically when
      ingress hits the per-TU ceiling, up to a configured maximum.
  - name: Backoff on ServerBusy
    description: When the broker returns ServerBusy (50008) or 429, back off exponentially with jitter
      and reduce send concurrency.
  - name: Partition planning
    description: Use partitions to scale consumer parallelism; default 32 partitions per Event Hub
      on Standard, more on Premium/Dedicated.
  - name: Batch sends
    description: Batch events to amortize overhead and stay within per-TU/PU event/sec ceilings.
maintainers:
