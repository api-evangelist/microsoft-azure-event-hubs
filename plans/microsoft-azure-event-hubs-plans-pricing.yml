specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Azure Event Hubs
providerId: microsoft-azure-event-hubs
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Event Streaming
  - Messaging
  - Big Data
  - Microsoft Azure
description: Azure Event Hubs has four tiers - Basic, Standard, Premium, Dedicated. Basic and Standard
  bill per Throughput Unit (TU) hour plus per-million ingress events; Premium bills per Processing
  Unit (PU) hour with stronger isolation; Dedicated reserves an entire single-tenant cluster (1-hour
  increments, 4-hour minimum charge).
sources:
  - https://azure.microsoft.com/en-us/pricing/details/event-hubs/
  - https://learn.microsoft.com/en-us/azure/event-hubs/compare-tiers
  - https://learn.microsoft.com/en-us/azure/event-hubs/event-hubs-faq
plans:
  - id: microsoft-azure-event-hubs-basic
    name: Basic
    type: usage-based
    description: Entry tier. 1 consumer group, 100 brokered connections, 1-day retention. Up to 20
      TUs.
    entries:
      - label: Throughput Unit / hour
        name: basic_tu
        type: subscription
        metric: hour
        limit: 20
        timeFrame: hour
        geo: per-region
        unit: 1
        price: 'see Azure pricing page (typical ~$0.015/TU/hour list)'
        userMultiplied: false
      - label: Ingress events
        name: basic_ingress
        type: metered
        metric: event
        limit: -1
        timeFrame: usage
        geo: per-region
        unit: 1000000
        price: '~$0.028 per 1M events'
        userMultiplied: false
    elements:
      - name: 1 consumer group
      - name: 100 brokered connections
      - name: 1-day event retention
      - name: Up to 20 TUs
  - id: microsoft-azure-event-hubs-standard
    name: Standard
    type: usage-based
    description: General-purpose streaming. 20 consumer groups, 1,000 connections, 7-day retention,
      Capture, Schema Registry. Up to 40 TUs (20 self-serve, request to 40).
    entries:
      - label: Throughput Unit / hour
        name: standard_tu
        type: subscription
        metric: hour
        limit: 40
        timeFrame: hour
        geo: per-region
        unit: 1
        price: 'see Azure pricing page (typical ~$0.03/TU/hour list)'
        userMultiplied: false
      - label: Ingress events
        name: standard_ingress
        type: metered
        metric: event
        limit: -1
        timeFrame: usage
        geo: per-region
        unit: 1000000
        price: '~$0.028 per 1M events'
        userMultiplied: false
      - label: Capture
        name: standard_capture
        type: metered
        metric: hour
        limit: -1
        timeFrame: hour
        geo: per-region
        unit: 1
        price: 'see Azure pricing page (per TU/hour)'
        userMultiplied: false
    elements:
      - name: 20 consumer groups
      - name: 1,000 brokered connections
      - name: 7-day retention
      - name: Capture to Blob/ADLS
      - name: Schema Registry
  - id: microsoft-azure-event-hubs-premium
    name: Premium
    type: usage-based
    description: Per-Processing-Unit pricing with multi-tenant isolation, 90-day retention, dynamic
      partition scale-out. Purchase 1, 2, 4, 6, 8, 10, 12, or 16 PUs per namespace.
    entries:
      - label: Processing Unit / hour
        name: premium_pu
        type: subscription
        metric: hour
        limit: 16
        timeFrame: hour
        geo: per-region
        unit: 1
        price: 'see Azure pricing page (per-PU/hour)'
        userMultiplied: false
    elements:
      - name: Multi-tenant isolation
      - name: 90-day retention
      - name: Dynamic partition scale-out
      - name: Customer-managed keys
      - name: 1, 2, 4, 6, 8, 10, 12, or 16 PUs
  - id: microsoft-azure-event-hubs-dedicated
    name: Dedicated
    type: enterprise
    description: Single-tenant dedicated cluster. Capacity Units (CUs) billed in 1-hour increments
      with 4-hour minimum. Highest throughput and isolation.
    entries:
      - label: Capacity Unit / hour
        name: dedicated_cu
        type: subscription
        metric: hour
        limit: -1
        timeFrame: hour
        geo: per-region
        unit: 1
        price: 'see Azure pricing page (per-CU/hour, 4-hour minimum)'
        userMultiplied: false
    elements:
      - name: Single-tenant cluster
      - name: 1-hour billing increments, 4-hour minimum
      - name: Highest isolation and throughput
      - name: Multi-region scale-out via clusters
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
